# cargo-deny configuration for buttre
# https://embarkstudios.github.io/cargo-deny/

# cargo-deny 0.19 schema — the old `[advisories] vulnerability/unmaintained/
# unsound` severity fields and `[licenses] deny/copyleft/allow-osi-fsf-free`
# fields were REMOVED upstream (this file predated that break and had never
# actually run since — `cargo deny check` failed to even deserialize it).
[advisories]
# Unlike cargo-audit, cargo-deny 0.19 has no separate warn/deny dial for
# "unmaintained"/"unsound" advisories — they are hard errors unless listed
# here. Every entry below is a TRANSITIVE dependency of the Linux desktop
# stack (winit's Wayland/X11 backends, the GTK3 tray-icon fallback, zbus
# D-Bus) — buttre's primary shipped target is Windows, and none of these
# process untrusted input at runtime on any target. Re-evaluate if/when
# winit, tray-icon, or zbus bump their own transitive pins upstream.
ignore = [
    # quick-xml (via wayland-scanner, a *build-time* codegen tool, not a
    # runtime parser): quadratic-time / unbounded-alloc DoS advisories.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # anyhow: Error::downcast_mut() unsoundness — buttre doesn't call
    # downcast_mut() on anyhow errors anywhere in the codebase.
    "RUSTSEC-2026-0190",
    # gtk-rs GTK3 bindings (Linux tray-icon fallback backend): unmaintained.
    "RUSTSEC-2024-0413", # atk
    "RUSTSEC-2024-0416", # atk-sys
    "RUSTSEC-2024-0412", # gdk
    "RUSTSEC-2024-0418", # gdk-sys
    "RUSTSEC-2024-0415", # gtk
    "RUSTSEC-2024-0420", # gtk-sys
    "RUSTSEC-2024-0419", # gtk3-macros
    # bincode (via zbus, Linux D-Bus): unmaintained.
    "RUSTSEC-2025-0141",
    # derivative (via zbus): unmaintained.
    "RUSTSEC-2024-0388",
    # instant (via zbus's async stack): unmaintained.
    "RUSTSEC-2024-0384",
    # proc-macro-error (via glib-macros/gtk3-macros): unmaintained.
    "RUSTSEC-2024-0370",
    # ttf-parser (via winit's Wayland CSD font rendering): unmaintained.
    "RUSTSEC-2026-0192",
    # paste (via Slint's i-slint-core macros, config window): unmaintained.
    "RUSTSEC-2024-0436",
    # rustybuzz (via Slint text shaping, config window): unmaintained.
    "RUSTSEC-2026-0206",
]

[licenses]
# Allow-list only in the current schema — anything not listed here is
# implicitly denied, which is what enforces "no GPL/AGPL in third-party
# dependencies" (the old explicit `deny` list is gone, but an allow-list
# achieves the same outcome). buttre's OWN crates are GPL-3.0-only by
# design; they are exempted via `[licenses.private]` below rather than by
# adding GPL to this list, so a genuinely new GPL third-party dependency
# still gets caught.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
]
# Slint (config window UI) is tri-licensed `GPL-3.0-only OR
# LicenseRef-Slint-Royalty-free OR LicenseRef-Slint-commercial`. buttre's own
# crates are GPL-3.0-only, so we take Slint's GPL branch — scoped per-crate
# (not added to `allow`) so any OTHER new GPL dependency is still caught.
exceptions = [
    { allow = ["GPL-3.0-only"], crate = "slint" },
    { allow = ["GPL-3.0-only"], crate = "slint-build" },
    { allow = ["GPL-3.0-only"], crate = "slint-macros" },
    { allow = ["GPL-3.0-only"], crate = "i-slint-backend-linuxkms" },
    { allow = ["GPL-3.0-only"], crate = "i-slint-backend-selector" },
    { allow = ["GPL-3.0-only"], crate = "i-slint-backend-winit" },
    { allow = ["GPL-3.0-only"], crate = "i-slint-common" },
    { allow = ["GPL-3.0-only"], crate = "i-slint-compiler" },
    { allow = ["GPL-3.0-only"], crate = "i-slint-core" },
    { allow = ["GPL-3.0-only"], crate = "i-slint-core-macros" },
    { allow = ["GPL-3.0-only"], crate = "i-slint-renderer-femtovg" },
    { allow = ["GPL-3.0-only"], crate = "i-slint-renderer-skia" },
    # libFuzzer's C++ runtime carries the NCSA license (permissive,
    # OSI-approved); the crate is a fuzz-target-only dependency, never shipped.
    { allow = ["MIT", "Apache-2.0", "NCSA"], crate = "libfuzzer-sys" },
]
# Require confidence threshold for license detection
confidence-threshold = 0.8

[licenses.private]
# Workspace crates are internal (never published to crates.io) and
# GPL-3.0-only by design — exclude them from the third-party allow-list
# check above instead of adding GPL/AGPL to it. Requires `publish = false`
# on each workspace member's Cargo.toml (see that field's own comment).
ignore = true

[bans]
# Deny multiple versions of the same crate
multiple-versions = "warn"
# Deny wildcard dependencies
wildcards = "allow"
# Highlight certain crates
highlight = "all"
# Skip checking these crates for multiple versions
skip = [
    # Windows-rs has some version conflicts, allow for now
    # { name = "windows", version = "*" },
]
# Deny specific crates
deny = [
    # Example: crates known to be problematic
    # { name = "openssl", version = "*" },
]

[sources]
# Deny crates from unknown registries
unknown-registry = "deny"
# Deny crates from git sources (prefer crates.io)
unknown-git = "warn"
# Allow crates.io
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Allow specific git sources if needed
allow-git = []
