name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: windows-latest
    # github-action-benchmark pushes its data series to the gh-pages branch
    # (auto-push below) and comments on alerts — both need write access; the
    # repo's default GITHUB_TOKEN is read-only.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-criterion
        run: cargo install cargo-criterion

      # github-action-benchmark's built-in `cargo` parser only understands
      # libtest's `test ... bench: N ns/iter` format — NOT criterion's
      # `time: [..]` report, so every prior run stored zero results and
      # failed with "No benchmark result was found". Emit cargo-criterion's
      # structured JSON message stream and reduce it to the action's
      # customSmallerIsBetter schema (nanoseconds, lower is better) with jq
      # (preinstalled on GitHub runners).
      - name: Run benchmarks
        run: |
          cargo criterion --workspace --message-format=json \
            | jq -s '[.[] | select(.reason == "benchmark-complete")
                     | {name: .id, unit: .typical.unit, value: .typical.estimate}]' \
            > bench-output.json
        shell: bash

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        if: github.event_name != 'pull_request'
        with:
          name: buttre Benchmarks
          tool: 'customSmallerIsBetter'
          output-file-path: bench-output.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # Show alert when performance degrades
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
